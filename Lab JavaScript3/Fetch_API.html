<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fetch API Demo</title>
    <style>
        body {
            font-family: "Prompt", sans-serif;
            padding: 20px;
            background: #f5f5f5;
        }

        h1 {
            margin-bottom: 15px;
        }

        button {
            padding: 8px 16px;
            font-size: 14px;
            cursor: pointer;
            border-radius: 6px;
            background: #00bfff;
            border: none;
            color: white;
            margin-bottom: 15px;
        }

        button:hover {
            background: #0095d6;
        }

        ul {
            line-height: 2;
        }
    </style>
</head>
<body>
    <h1>Fetch API Demo: GET Users</h1>
    <button id="btn">โหลดรายชื่อผู้ใช้</button>
    <ul id="list"></ul>

    <script>
        const btn = document.getElementById("btn");
        const list = document.getElementById("list");

        btn.addEventListener("click", () => {
            // 1) ส่ง request ไปยัง API
            fetch("https://jsonplaceholder.typicode.com/users")
                // 2) แปลง JSON -> JavaScript Object/Array
                .then(res => res.json())
                // 3) ใช้ข้อมูล: นำมาแสดงบนหน้าเว็บ
                .then(users => {
                    list.innerHTML = ""; // ล้างของเก่า
                    users.forEach(u => {
                        const li = document.createElement("li");
                        li.textContent = `${u.name} (${u.email})`;
                        list.appendChild(li);
                    });
                })
                .catch(err => {
                    console.log("เกิดข้อผิดพลาด:", err);
                });
        });
    </script>
</body>
</html>
